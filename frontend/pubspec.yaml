name: shadow_catcher
description: AI-Powered Download Shield with malware detection
publish_to: none
version: 1.0.0+1

environment:
  sdk: '^3.11.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.0.0
  http: ^1.2.0
  dio: ^5.4.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  lottie: ^3.0.0
  fl_chart: ^0.68.0
  flutter_svg: ^2.0.10
  ffi: ^2.1.0
  path: ^1.9.0
  crypto: ^3.0.3
  mime: ^1.0.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/ai/
    - assets/config/
    - assets/icons/
    - assets/animations/
